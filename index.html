<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calc Pro</title>

<meta name="apple-mobile-web-app-title" content="Calc Pro">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body {
  margin: 0;
  background: #000;
  font-family: Arial;
  display: flex;
  justify-content: center;
}

.app {
  width: 100%;
  max-width: 420px;
  padding: 15px;
}

.display {
  height: 100px;
  background: #111;
  color: white;
  font-size: 40px;
  text-align: right;
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 15px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 10px;
}

button {
  height: 70px;
  border: none;
  border-radius: 50px;
  font-size: 24px;
  background: #333;
  color: white;
}

.op { background: orange; }
.top { background: #aaa; color: black; }
.zero { grid-column: span 2; }

#vault { display:none; }

.tabs {
  display:grid;
  grid-template-columns: repeat(5,1fr);
  gap:6px;
  margin-bottom:10px;
}

.tabs button {
  height:40px;
  font-size:12px;
  border-radius:10px;
}

.panel { display:none; }
.panel.active { display:block; }

input, textarea {
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  border:none;
  background:#111;
  color:white;
}

.card {
  background:#111;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

.small-btn {
  height:40px;
  border-radius:10px;
  margin-top:5px;
}
</style>
</head>

<body>

<div class="app">

<div id="calc">
<div id="display" class="display">0</div>

<div class="grid">
<button class="top" onclick="clearCalc()">AC</button>
<button class="top" onclick="back()">⌫</button>
<button class="top" onclick="press('%')">%</button>
<button class="op" onclick="press('/')">÷</button>

<button onclick="press('7')">7</button>
<button onclick="press('8')">8</button>
<button onclick="press('9')">9</button>
<button class="op" onclick="press('*')">×</button>

<button onclick="press('4')">4</button>
<button onclick="press('5')">5</button>
<button onclick="press('6')">6</button>
<button class="op" onclick="press('-')">−</button>

<button onclick="press('1')">1</button>
<button onclick="press('2')">2</button>
<button onclick="press('3')">3</button>
<button class="op" onclick="press('+')">+</button>

<button class="zero" onclick="press('0')">0</button>
<button onclick="press('.')">.</button>
<button class="op" onclick="calc()">=</button>
</div>
</div>

<div id="vault">

<h3>Private</h3>
<button onclick="lock()">Lock</button>

<div class="tabs">
<button onclick="show('contacts')">Contacts</button>
<button onclick="show('email')">Email</button>
<button onclick="show('notes')">Notes</button>
<button onclick="show('photos')">Photos</button>
<button onclick="show('settings')">Settings</button>
</div>

<div id="contacts" class="panel active">
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">
<button class="small-btn" onclick="addContact()">Add</button>
<div id="contactList"></div>
</div>

<div id="email" class="panel">
<input id="emailTo" placeholder="To">
<input id="emailSub" placeholder="Subject">
<textarea id="emailBody"></textarea>
<button onclick="sendEmail()">Send</button>
</div>

<div id="notes" class="panel">
<textarea id="note"></textarea>
<button onclick="saveNote()">Save</button>
<div id="notesList"></div>
</div>

<div id="photos" class="panel">
<input type="file" id="photo">
<button onclick="savePhoto()">Save</button>
<div id="photosList"></div>
</div>

<div id="settings" class="panel">
<input id="old" placeholder="Current passcode">
<input id="new" placeholder="New passcode">
<button onclick="changePasscode()">Change</button>
</div>

</div>
</div>

<script>

let SECRET = localStorage.getItem("pass") || "713";
let input="";

function press(v){
input+=v;
display.innerText=input;
if(input===SECRET){openVault();}
}

function clearCalc(){input="";display.innerText="0";}
function back(){input=input.slice(0,-1);display.innerText=input||"0";}

function calc(){
try{input=eval(input).toString();display.innerText=input;}
catch{display.innerText="Error";input="";}
}

function openVault(){
calcDiv.style.display="none";
vault.style.display="block";
loadContacts();loadNotes();loadPhotos();
}

function lock(){
vault.style.display="none";
calcDiv.style.display="block";
clearCalc();
}

function show(id){
document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function changePasscode(){
if(document.getElementById("old").value!==SECRET){alert("Wrong");return;}
SECRET=document.getElementById("new").value;
localStorage.setItem("pass",SECRET);
alert("Changed");
}

function get(key){return JSON.parse(localStorage.getItem(key)||"[]");}
function set(key,v){localStorage.setItem(key,JSON.stringify(v));}

function addContact(){
let c=get("c");
c.push({n:name.value,p:phone.value,e:email.value});
set("c",c);loadContacts();
}

function loadContacts(){
contactList.innerHTML="";
get("c").forEach(c=>{
contactList.innerHTML+=`
<div class="card">
${c.n}<br>${c.p}<br>${c.e}
<br>
<a href="tel:${c.p}">Call</a>
<a href="sms:${c.p}">Text</a>
<a href="mailto:${c.e}">Email</a>
</div>`;
});
}

function sendEmail(){
window.location.href=`mailto:${emailTo.value}?subject=${emailSub.value}&body=${emailBody.value}`;
}

function saveNote(){
let n=get("n");n.push(note.value);set("n",n);loadNotes();
}

function loadNotes(){
notesList.innerHTML="";
get("n").forEach(n=>notesList.innerHTML+=`<div class="card">${n}</div>`);
}

function savePhoto(){
let f=photo.files[0];
let r=new FileReader();
r.onload=e=>{
let p=get("p");p.push(e.target.result);set("p",p);loadPhotos();
};
r.readAsDataURL(f);
}

function loadPhotos(){
photosList.innerHTML="";
get("p").forEach(p=>photosList.innerHTML+=`<img src="${p}" style="width:100%">`);
}

</script>

</body>
</html>
